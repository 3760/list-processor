# 应用配置文件（YAML 格式）
# 详细说明见详细设计 §9 配置管理

# 1. 去重字段（默认配置）
deduplication:
  # 一线名单去重字段
  yixian:
    - 手机
  # 三方名单去重字段
  sanfang:
    - 手机
  # HW名单去重字段
  hw:
    - 手机
  # 跨名单去重字段
  cross_list:
    - 手机

# 2. 超时配置（秒）
timeout:
  file_load: 300        # 文件加载超时
  module_execute: 600   # 单模块执行超时
  total_process: 3600   # 全流程超时

# 3. 日志配置
logging:
  level: INFO           # DEBUG / INFO / WARNING / ERROR
  max_file_size_mb: 10  # 单个日志文件大小上限
  backup_count: 5       # 保留历史日志文件数量

# 4. 数据字典配置
dict:
  # 字典文件缓存目录（相对项目根目录）
  cache_dir: dict/

# 5. 字段规范配置
spec:
  # 字段规范默认文件路径（相对项目根目录）
  default_path: config/field_spec.yaml
