# 应用配置文件（YAML 格式）
# 【测试数据】用于 F3-UT-003 测试：配置文件失效时关键字匹配降级
# ⚠️ 去重字段配置缺失，应触发降级至关键字模糊匹配

# 1. 超时配置（秒）
timeout:
  file_load: 300        # 文件加载超时
  module_execute: 600   # 单模块执行超时
  total_process: 3600   # 全流程超时

# 2. 日志配置
logging:
  level: INFO           # DEBUG / INFO / WARNING / ERROR
  max_file_size_mb: 10  # 单个日志文件大小上限
  backup_count: 5       # 保留历史日志文件数量

# 3. 数据字典配置
dict:
  # 字典文件缓存目录（相对项目根目录）
  cache_dir: dict/

# 4. 字段规范配置
spec:
  # 字段规范默认文件路径（相对项目根目录）
  default_path: config/field_spec.yaml

# ⚠️ 去重字段配置缺失，deduplication 节点不存在
